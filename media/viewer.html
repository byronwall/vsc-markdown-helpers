<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="{{CSP}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{STYLE_URI}}" />
    <title>Markdown Helpers</title>
  </head>
  <body>
    <div class="app-shell">
      <div class="workspace-picker">
        <button
          id="toggleFilesButton"
          class="ghost-button icon-button icon-files workspace-picker-toggle"
          type="button"
          title="Choose markdown file"
          aria-label="Choose markdown file"
          aria-controls="filesPanel"
          aria-expanded="false"
          aria-haspopup="dialog"
        ></button>

        <aside
          id="filesPanel"
          class="panel panel-files is-collapsed"
          aria-label="Markdown files"
          aria-hidden="true"
          tabindex="-1"
        >
          <div class="panel-header">
            <div>
              <p class="eyebrow">Workspace</p>
              <h1>Markdown Files</h1>
            </div>
            <button
              id="refreshButton"
              class="ghost-button icon-button icon-refresh"
              type="button"
              title="Refresh"
              aria-label="Refresh"
            ></button>
          </div>
          <div id="filesEmptyState" class="empty-state hidden">
            No markdown files found.
          </div>
          <div id="filesList" class="files-list" role="list"></div>
        </aside>
      </div>

      <main class="panel panel-preview">
        <header class="preview-header">
          <div>
            <p class="eyebrow">Preview</p>
            <h2 id="previewTitle">Select a markdown file</h2>
            <p id="previewPath" class="preview-path">Rendered preview stays here.</p>
          </div>
          <div class="preview-actions">
            <button
              id="openTextButton"
              class="ghost-button icon-button icon-open-text"
              type="button"
              title="Open text file"
              aria-label="Open text file"
            ></button>
          </div>
        </header>
        <div id="errorBanner" class="error-banner hidden"></div>
        <article id="previewContent" class="preview-content empty-preview">
          <div class="welcome-card">
            <p class="eyebrow">Rendered HTML</p>
            <h3>Markdown preview lives here</h3>
            <p>
              Pick a markdown file from the top-left library button to render it here with a bounded reading width.
            </p>
          </div>
        </article>
      </main>

      <aside class="panel panel-outline">
        <div class="panel-header compact">
          <div>
            <p class="eyebrow">Outline</p>
            <h2>Sections</h2>
          </div>
        </div>
        <div id="tocEmptyState" class="empty-state">No headings yet.</div>
        <nav id="tocList" class="toc-list"></nav>
      </aside>
    </div>

    <script type="module" src="{{SCRIPT_URI}}"></script>
  </body>
</html>
